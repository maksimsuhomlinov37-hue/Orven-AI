<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #0a0a0a; color: #e2e8f0; font-family: sans-serif; padding: 50px; }
        .admin-box { width: 400px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        input, textarea { width: 100%; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>Админ Панель</h2>
        <input type="text" id="title" placeholder="Заголовок">
        <textarea id="desc" placeholder="Описание"></textarea>
        <button onclick="saveData()">Сохранить (эмуляция)</button>
    </div>

    <script>
        function saveData() {
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value
            };
            console.log("Данные для JSON:", JSON.stringify(data));
            alert("Данные подготовлены в консоли!");
        }
    </script>
</body>
</html>
