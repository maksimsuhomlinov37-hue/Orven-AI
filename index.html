<!DOCTYPE html>
<html>
<head>
    <title>Мой Сайт</title>
</head>
<body id="body">
    <h1>Привет! Это мой сайт.</h1>
    <script>
        fetch('settings.json')
            .then(response => response.json())
            .then(data => {
                document.body.style.backgroundColor = data.bgColor;
            });
    </script>
</body>
</html>
